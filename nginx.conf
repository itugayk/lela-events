server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Güvenlik başlıkları
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Astro statik çıktı: önce dosya, sonra /dizin/, sonra 404
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Statik varlıkları uzun süre önbelleğe al (hash'li dosyalar)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Özel 404 sayfası
    error_page 404 /404.html;

    # Gizli dosyalara erişimi engelle
    location ~ /\.(?!well-known) {
        deny all;
    }
}
